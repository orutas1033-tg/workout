<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- viewport-fit=cover: iPhone のノッチ/ホームインジケータ領域まで背景を敷くため -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12151A">
<!-- iOS でホーム画面に追加したときにスタンドアロン起動させる -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>筋トレメモ</title>
<link rel="manifest" href="manifest.json">

<style>
/* =====================================================================
   デザイントークン
   - 外部フォント/CDN は一切使わない（オフライン要件）。
     そのため書体で個性を出せないので、「数値の見せ方」を主役にする。
   - 配色: 暗いインク色ベース + 真鍮色（プレートの色）のアクセント1色のみ。
   ===================================================================== */
:root {
  --ink:        #12151A;  /* 背景（最も暗い） */
  --surface:    #1B2027;  /* カード面 */
  --surface-2:  #232A33;  /* 入力欄・押下面 */
  --line:       #2C333D;  /* 罫線 */
  --text:       #E8ECF1;  /* 本文 */
  --muted:      #8D97A5;  /* 補助テキスト */
  --accent:     #F0B429;  /* アクセント（真鍮色）。ここぞという1箇所だけに使う */
  --danger:     #E5484D;  /* 破壊的操作 */
  --ok:         #3DD68C;

  --radius: 10px;
  --tap: 44px;            /* iOS の推奨最小タップ領域 */

  /* 数字用フォント: 桁が揃うように等幅系を優先 */
  --font-num: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
             "Yu Gothic", "Noto Sans JP", sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 16px;               /* iOS で入力時に自動ズームされないよう 16px を下回らせない */
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
}

/* すべての数字を等幅・桁揃えに（このアプリの視覚的な芯） */
.num, input[type="number"], .set-table {
  font-family: var(--font-num);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

/* ---------- レイアウト ---------- */
.app {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px;
  /* 下部ナビの高さ + iPhone のホームインジケータ分を確保 */
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
}

header.app-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--ink);
  padding: calc(12px + env(safe-area-inset-top)) 0 12px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: baseline; justify-content: space-between;
}
.app-title { font-size: 17px; font-weight: 700; letter-spacing: .04em; margin: 0; }
.app-title .mark { color: var(--accent); }
.app-sub { font-size: 12px; color: var(--muted); }

/* ---------- 下部タブナビ ---------- */
nav.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  display: flex;
  background: rgba(18,21,26,.94);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom);
}
nav.tabbar button {
  flex: 1;
  min-height: var(--tap);
  padding: 10px 4px 8px;
  background: none; border: none;
  color: var(--muted);
  font-family: inherit; font-size: 11px; letter-spacing: .06em;
  cursor: pointer;
  border-top: 2px solid transparent;
  margin-top: -1px;
}
nav.tabbar button[aria-current="page"] {
  color: var(--text);
  border-top-color: var(--accent);
}
nav.tabbar .tab-glyph { display: block; font-size: 18px; line-height: 1.2; }

/* ---------- 汎用パーツ ---------- */
.section { padding: 20px 0; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
h2.section-title {
  margin: 0;
  font-size: 12px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted);
}

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}

.btn {
  min-height: var(--tap);
  padding: 0 16px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit; font-size: 15px; font-weight: 600;
  cursor: pointer;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent); color: #1A1400; border-color: var(--accent);
}
.btn-danger { color: var(--danger); border-color: var(--danger); background: transparent; }
.btn-sm { min-height: 36px; padding: 0 12px; font-size: 13px; font-weight: 500; }
.btn-block { display: block; width: 100%; }
.btn:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 2px;
}

label.field { display: block; margin-bottom: 12px; }
label.field > span {
  display: block; margin-bottom: 6px;
  font-size: 12px; color: var(--muted); letter-spacing: .04em;
}
input[type="text"], input[type="number"], input[type="date"], select {
  width: 100%;
  min-height: var(--tap);
  padding: 0 12px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-ui); font-size: 16px;
  appearance: none;
}
.check {
  display: flex; align-items: center; gap: 10px;
  min-height: var(--tap);
  font-size: 15px;
}
.check input { width: 22px; height: 22px; accent-color: var(--accent); }

.muted { color: var(--muted); }
.empty {
  padding: 28px 16px; text-align: center;
  color: var(--muted); font-size: 14px;
  border: 1px dashed var(--line); border-radius: var(--radius);
}
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.stack-sm > * + * { margin-top: 8px; }

/* バックアップ警告バー */
.warnbar {
  display: flex; align-items: center; gap: 12px;
  margin: 12px 0 0;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--accent);
  background: rgba(240,180,41,.08);
  font-size: 13px;
}
.warnbar strong { color: var(--accent); }
.warnbar .btn { flex-shrink: 0; }

/* 種目カード */
.ex-item { display: flex; align-items: center; gap: 12px; }
.ex-main { flex: 1; min-width: 0; }
.ex-name { font-size: 16px; font-weight: 600; }
.ex-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ex-last { font-family: var(--font-num); font-variant-numeric: tabular-nums;
           font-size: 13px; color: var(--text); }
.badge {
  display: inline-block;
  padding: 1px 6px; margin-left: 6px;
  border-radius: 4px;
  border: 1px solid var(--line);
  font-size: 10px; letter-spacing: .06em; color: var(--muted);
  vertical-align: 1px;
}
.badge-uni { color: var(--accent); border-color: var(--accent); }
.is-inactive .ex-name { color: var(--muted); text-decoration: line-through; }

/* モーダル */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,.6);
  display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  width: 100%; max-width: 640px;
  background: var(--surface);
  border-top: 2px solid var(--accent);
  border-radius: 14px 14px 0 0;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  max-height: 90vh; overflow-y: auto;
}
.modal h3 { margin: 0 0 16px; font-size: 16px; }
@media (prefers-reduced-motion: no-preference) {
  .modal { animation: slideup .18s ease-out; }
  @keyframes slideup { from { transform: translateY(16px); opacity: 0; } }
}

/* トースト */
.toast {
  position: fixed; left: 50%; bottom: calc(84px + env(safe-area-inset-bottom));
  transform: translateX(-50%); z-index: 40;
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 999px; padding: 10px 18px;
  font-size: 14px; white-space: nowrap;
}

/* =====================================================================
   ワークアウト編集画面（フェーズ2）
   ===================================================================== */

/* 編集中は下部タブを隠す（誤タップで編集から抜けてしまうのを防ぐ） */
body.editing nav.tabbar { display: none; }

/* 編集画面のヘッダ（キャンセル / タイトル / 保存） */
.editor-bar {
  position: sticky; top: 0; z-index: 15;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: var(--ink);
  padding: calc(10px + env(safe-area-inset-top)) 0 10px;
  border-bottom: 1px solid var(--line);
}
.editor-bar .title { font-size: 14px; font-weight: 700; letter-spacing: .04em; }

/* 種目ごとのブロック */
.ex-block { margin-bottom: 12px; }
.ex-block-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.ex-block-name { font-size: 15px; font-weight: 600; }
.ex-block-name .badge { vertical-align: 2px; }

/* セット表 */
.set-head, .set-row {
  display: grid;
  align-items: center;
  gap: 6px;
}
/* 筋力系: [# | 重量 | 回数 | RPE | 片側 | 削除] */
.set-head.strength, .set-row.strength {
  grid-template-columns: 26px minmax(52px,1fr) 54px 50px 34px 30px;
}
/* 持久系: [# | 分 | 秒 | km | RPE | 削除] */
.set-head.endurance, .set-row.endurance {
  grid-template-columns: 26px 1fr 48px 1fr 50px 30px;
}
.set-head {
  font-size: 10px; color: var(--muted); letter-spacing: .02em;
  text-align: center; margin-bottom: 4px;
}
.set-row { margin-bottom: 6px; }
.set-row .set-no {
  font-family: var(--font-num); font-variant-numeric: tabular-nums;
  color: var(--muted); font-size: 13px; text-align: center;
}
/* セット表内の数値入力は小さく詰める。ただし iOS の自動ズームを避けるため 16px は維持 */
.set-row input[type="number"] {
  min-height: 40px; padding: 0 4px; text-align: center;
  font-family: var(--font-num); font-variant-numeric: tabular-nums;
}
.set-row .uni-cell { display: flex; align-items: center; justify-content: center; }
.set-row .uni-cell input { width: 22px; height: 22px; accent-color: var(--accent); margin: 0; }
.set-row .del-cell button {
  width: 30px; height: 40px; padding: 0;
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer;
}
.set-row .del-cell button:active { color: var(--danger); }

.add-set {
  width: 100%; min-height: 38px; margin-top: 4px;
  background: none; border: 1px dashed var(--line); border-radius: var(--radius);
  color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer;
}
.add-set:active { color: var(--text); border-color: var(--accent); }

/* 種目ピッカー（モーダル内）の検索 + 一覧 */
.picker-search { margin-bottom: 10px; }
.picker-list { max-height: 46vh; overflow-y: auto; }
.picker-item {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; min-height: var(--tap);
  padding: 10px 12px; margin-bottom: 6px;
  background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius);
  color: var(--text); font-family: inherit; font-size: 15px; text-align: left; cursor: pointer;
}
.picker-item:active { border-color: var(--accent); }
.picker-item .p-meta { font-size: 11px; color: var(--muted); }

.hidden { display: none !important; }
</style>
</head>

<body>

<div class="app">
  <header class="app-header">
    <h1 class="app-title"><span class="mark">▮</span> 筋トレメモ</h1>
    <span class="app-sub" id="storage-status"></span>
  </header>

  <main id="view"><!-- 画面はここに描画される --></main>
</div>

<nav class="tabbar" id="tabbar">
  <button data-tab="home"><span class="tab-glyph">▤</span>ホーム</button>
  <button data-tab="exercises"><span class="tab-glyph">▦</span>種目</button>
  <button data-tab="settings"><span class="tab-glyph">▩</span>設定</button>
</nav>

<div id="modal-root"></div>

<script>
"use strict";

/* =====================================================================
   1. 定数とユーティリティ
   ===================================================================== */

const STORAGE_KEY    = "kintore-memo";  // localStorage のキー（オリジン単位で保持される）
const SCHEMA_VERSION = 1;               // データ構造のバージョン。将来の移行判定に使う
const BACKUP_WARN_DAYS = 14;            // 最終エクスポートからこの日数を過ぎたら警告を出す

// 一意なIDを作る。表示には一切使わず、参照専用（種目のリネームで履歴が切れないようにするため）
function genId(prefix) {
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// YYYY-MM-DD 形式の今日の日付（タイムゾーンずれを避けるためローカル値から組み立てる）
function todayStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

// HTML エスケープ（種目名をそのまま innerHTML に入れると壊れるため必ず通す）
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

// 簡易トースト表示
let toastTimer = null;
function toast(msg) {
  document.querySelector(".toast")?.remove();
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 2200);
}


/* =====================================================================
   2. 派生値の計算（保存はせず、常に記録から計算する）
      - ここを関数に切り出しておくと、画面・CSV出力の双方から使い回せる
   ===================================================================== */

// セットのボリューム。片方ずつ(isUnilateral)の場合は左右を合算するため 2 倍する。
//   例: 60kg × 10回 を左右それぞれ → 60 * 10 * 2 = 1200
function setVolume(s) {
  if (s.weightKg == null || s.reps == null) return 0;
  return s.weightKg * s.reps * (s.isUnilateral ? 2 : 1);
}

// 推定1RM（Epley式）。高レップからの外挿は誤差が大きいので、画面では「参考値」と明記する。
function estimate1RM(weightKg, reps) {
  if (weightKg == null || reps == null || reps < 1) return null;
  return weightKg * (1 + reps / 30);
}

// ワークアウト全体の総ボリューム
function workoutVolume(w) {
  return (w.sets || []).reduce((sum, s) => sum + setVolume(s), 0);
}


/* =====================================================================
   3. データ層（localStorage への読み書き）

      重要な前提:
      localStorage は「保管庫」ではなく「キャッシュ」として扱う。
      iOS Safari は条件次第でストレージを削除しうるため、
      JSON エクスポートによるバックアップを必須機能としている（設定タブ）。
   ===================================================================== */

let db = null;             // メモリ上の唯一のデータ実体
let storageOK = true;      // localStorage が使えない環境（プライベートブラウズ等）の検出用

// 空のデータベースを作る
function emptyDB() {
  return {
    schemaVersion: SCHEMA_VERSION,
    exercises: [],
    workouts: [],
    meta: { lastExportedAt: null }
  };
}

// 読み込んだ生データが最低限の形を満たしているか検証する（インポート時にも使う）
function validateDB(obj) {
  if (!obj || typeof obj !== "object") return "データがオブジェクトではありません";
  if (typeof obj.schemaVersion !== "number") return "schemaVersion がありません";
  if (obj.schemaVersion > SCHEMA_VERSION) {
    return `新しい形式のデータです（v${obj.schemaVersion}）。アプリを更新してください`;
  }
  if (!Array.isArray(obj.exercises)) return "exercises が配列ではありません";
  if (!Array.isArray(obj.workouts))  return "workouts が配列ではありません";
  return null; // 問題なし
}

// localStorage から読み込む。壊れていたら空データで起動する（アプリが開かなくなるのを防ぐ）
function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { db = emptyDB(); return; }
    const obj = JSON.parse(raw);
    const err = validateDB(obj);
    if (err) {
      console.error("保存データが不正:", err);
      alert("保存データを読み込めませんでした。空の状態で起動します。\n（バックアップJSONがあれば、設定タブから復元してください）");
      db = emptyDB();
      return;
    }
    db = obj;
    db.meta = db.meta || { lastExportedAt: null };
  } catch (e) {
    console.error(e);
    storageOK = false;
    db = emptyDB();
  }
}

// 保存する。失敗（容量超過・ストレージ無効）は握りつぶさず必ず知らせる
function saveDB() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    storageOK = true;
  } catch (e) {
    console.error(e);
    storageOK = false;
    toast("保存できませんでした。設定タブからバックアップを取ってください");
  }
  renderStorageStatus();
}

// 最終エクスポートからの経過日数（未エクスポートなら null）
function daysSinceExport() {
  if (!db.meta.lastExportedAt) return null;
  const diff = Date.now() - new Date(db.meta.lastExportedAt).getTime();
  return Math.floor(diff / 86400000);
}

// バックアップ警告を出すべきか
function needsBackupWarning() {
  if (db.workouts.length === 0) return false;   // 記録が無いうちは黙っている
  const d = daysSinceExport();
  return d === null || d >= BACKUP_WARN_DAYS;
}


/* =====================================================================
   4. 種目マスタの操作
      - 物理削除は提供しない。isActive=false で選択肢から隠すのみ。
        （過去の記録が参照している exerciseId を壊さないため）
   ===================================================================== */

function addExercise({ name, kind, isUnilateral }) {
  const ex = {
    id: genId("ex"),
    name: name.trim(),
    kind,                       // "strength" | "endurance"
    isUnilateral: !!isUnilateral,
    isActive: true
  };
  db.exercises.push(ex);
  saveDB();
  return ex;
}

function updateExercise(id, patch) {
  const ex = db.exercises.find((e) => e.id === id);
  if (!ex) return;
  Object.assign(ex, patch);
  if (ex.name) ex.name = ex.name.trim();
  saveDB();
}

function getExercise(id) {
  return db.exercises.find((e) => e.id === id) || null;
}

// 同名の種目が既にあるか（大文字小文字・前後空白を無視して判定）
function isDuplicateName(name, exceptId) {
  const key = name.trim().toLowerCase();
  return db.exercises.some((e) => e.id !== exceptId && e.name.trim().toLowerCase() === key);
}

// ある種目を含む「直近のワークアウト」を返す（オートフィルと一覧表示で使う）
// 日付の降順で探し、同日が複数あれば配列の後ろ（＝後から作られたもの）を優先する。
// excludeId: 編集中のワークアウト自身を除外するために使う（自己参照オートフィルを防ぐ）
function findLastWorkoutWithExercise(exerciseId, excludeId) {
  const hits = db.workouts.filter((w) =>
    w.id !== excludeId && (w.sets || []).some((s) => s.exerciseId === exerciseId)
  );
  if (hits.length === 0) return null;
  hits.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
  return hits[hits.length - 1];
}

// 種目一覧に出す「直近の代表記録」の文字列を作る
function lastRecordLabel(exerciseId) {
  const w = findLastWorkoutWithExercise(exerciseId);
  if (!w) return null;
  const sets = w.sets.filter((s) => s.exerciseId === exerciseId);
  const ex = getExercise(exerciseId);
  if (!ex) return null;

  if (ex.kind === "strength") {
    // 最も重い重量のセットを代表として表示する
    const top = sets.reduce((a, b) => (setVolume(b) > setVolume(a) ? b : a), sets[0]);
    const uni = top.isUnilateral ? " ×左右" : "";
    return `${w.date}　${top.weightKg}kg × ${top.reps}${uni}　全${sets.length}セット`;
  } else {
    const totSec = sets.reduce((s, x) => s + (x.durationSec || 0), 0);
    const totKm  = sets.reduce((s, x) => s + (x.distanceKm  || 0), 0);
    const min = Math.round(totSec / 60);
    return `${w.date}　${min}分 / ${totKm}km`;
  }
}


/* =====================================================================
   5. エクスポート / インポート（このアプリの生命線）
   ===================================================================== */

// Blob をダウンロードさせる共通処理
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  // 解放は少し遅らせる（即時 revoke すると iOS で保存に失敗することがある）
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// JSON エクスポート（＝バックアップの正本。これだけが完全な復元手段）

  render();
}

// CSV の1セル分をエスケープ（カンマ・引用符・改行を含む値に対応）
function csvCell(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

// CSV エクスポート（1行1セットのフラット形式。pandas にそのまま読ませる想定）
function exportCSV() {
  const header = [
    "date", "workout_duration_min", "exercise_name", "kind", "set_no",
    "weight_kg", "reps", "is_unilateral", "rpe",
    "duration_sec", "distance_km", "volume"
  ];
  const rows = [header.join(",")];

  // 日付順に並べてから展開する
  const sorted = [...db.workouts].sort((a, b) => (a.date < b.date ? -1 : 1));
  for (const w of sorted) {
    for (const s of (w.sets || [])) {
      const ex = getExercise(s.exerciseId);
      rows.push([
        w.date,
        w.durationMin,
        ex ? ex.name : "(削除済み種目)",
        ex ? ex.kind : "",
        s.setNo,
        s.weightKg ?? "",
        s.reps ?? "",
        s.isUnilateral ? 1 : 0,
        s.rpe ?? "",                 // RPE は任意入力なので空欄になりうる
        s.durationSec ?? "",
        s.distanceKm ?? "",
        setVolume(s) || ""
      ].map(csvCell).join(","));
    }
  }

  // BOM を付ける: Excel で開いたときに日本語が文字化けしないため
  const blob = new Blob(["\uFEFF" + rows.join("\n")], { type: "text/csv;charset=utf-8" });
  downloadBlob(blob, `kintore-${todayStr()}.csv`);
  toast("CSVを書き出しました");
}

// JSON インポート（現在のデータを完全に置き換える。必ず確認を挟む）
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let obj;
    try {
      obj = JSON.parse(reader.result);
    } catch {
      alert("JSONとして読めませんでした。ファイルが壊れている可能性があります。");
      return;
    }
    const err = validateDB(obj);
    if (err) { alert("読み込めません: " + err); return; }

    const msg =
      "現在のデータをすべて置き換えます。この操作は取り消せません。\n\n" +
      `読み込むデータ: ワークアウト ${obj.workouts.length} 件 / 種目 ${obj.exercises.length} 件\n` +
      `現在のデータ　: ワークアウト ${db.workouts.length} 件 / 種目 ${db.exercises.length} 件\n\n` +
      "続けますか？";
    if (!confirm(msg)) return;

    db = obj;
    db.meta = db.meta || { lastExportedAt: null };
    saveDB();
    toast("復元しました");
    render();
  };
  reader.readAsText(file);
}

/* =====================================================================
   6.5 ワークアウト編集（フェーズ2の中核）

   編集は「下書き(draft)」を作って行い、保存するまで db には反映しない。
   これによりキャンセルで変更を破棄できる。

   draft の構造（編集中だけ使う内部形式。保存時に schema の sets[] に変換する）:
     {
       id, _isNew,           // _isNew: まだ db に無い新規か
       date, durationMin, memo,
       blocks: [             // 種目ごとにセットをまとめて持つ（表示・並びの単位）
         { exerciseId,
           sets: [ { rpe, weightKg, reps, isUnilateral, durationSec, distanceKm } ] }
       ]
     }

   ★入力欄は「非制御」にしている（1文字打つたびに再描画しない）。
     再描画するとカーソルが飛ぶため。値は syncEditorToDraft() で
     構造変更・保存の直前に DOM → draft へまとめて吸い上げる。
   ===================================================================== */

let editingWorkout = null;   // null = 編集していない。オブジェクト = 編集中

// 既存ワークアウト(schema形式) → 編集用 blocks へ変換
// 同じ種目のセットは、最初に登場した順を保ってひとつのブロックにまとめる
function workoutToBlocks(w) {
  const order = [];               // exerciseId の登場順
  const map = new Map();          // exerciseId -> sets[]
  for (const s of (w.sets || [])) {
    if (!map.has(s.exerciseId)) { map.set(s.exerciseId, []); order.push(s.exerciseId); }
    map.get(s.exerciseId).push({
      rpe: s.rpe ?? null,
      weightKg: s.weightKg ?? null,
      reps: s.reps ?? null,
      isUnilateral: !!s.isUnilateral,
      durationSec: s.durationSec ?? null,
      distanceKm: s.distanceKm ?? null
    });
  }
  return order.map((exerciseId) => ({ exerciseId, sets: map.get(exerciseId) }));
}

// 編集用 blocks → schema の sets[] へ変換（setNo は種目ごとに 1 から振り直す）
function blocksToSets(blocks) {
  const sets = [];
  for (const b of blocks) {
    b.sets.forEach((s, i) => {
      sets.push({
        id: genId("st"),
        exerciseId: b.exerciseId,
        setNo: i + 1,
        rpe: s.rpe ?? null,
        weightKg: s.weightKg ?? null,
        reps: s.reps ?? null,
        isUnilateral: !!s.isUnilateral,
        durationSec: s.durationSec ?? null,
        distanceKm: s.distanceKm ?? null
      });
    });
  }
  return sets;
}

// 新規ワークアウトの下書きを作る（案A: 同じ日付でも常に新規）
function startNewWorkout() {
  editingWorkout = {
    id: genId("wo"),
    _isNew: true,
    date: todayStr(),
    durationMin: null,
    memo: "",
    blocks: []
  };
  document.body.classList.add("editing");
  renderWorkoutEditor();
}

// 既存ワークアウトを編集する
function startEditWorkout(id) {
  const w = db.workouts.find((x) => x.id === id);
  if (!w) return;
  editingWorkout = {
    id: w.id,
    _isNew: false,
    date: w.date,
    durationMin: w.durationMin ?? null,
    memo: w.memo || "",
    blocks: workoutToBlocks(w)
  };
  document.body.classList.add("editing");
  renderWorkoutEditor();
}

// 空セルの下書き行を1つ作る（種別に応じて）
function blankSet() {
  return { rpe: null, weightKg: null, reps: null, isUnilateral: false,
           durationSec: null, distanceKm: null };
}

// 種目を下書きに追加する。ここで「前回値オートフィル」を行う。
function addExerciseToDraft(exerciseId) {
  const ex = getExercise(exerciseId);
  if (!ex) return;

  // 直近ワークアウト（編集中の自分自身は除外）を探して、その種目のセット群を複製
  const last = findLastWorkoutWithExercise(exerciseId, editingWorkout.id);
  let sets;
  if (last) {
    const prev = last.sets.filter((s) => s.exerciseId === exerciseId);
    sets = prev.map((s) => ({
      rpe: null,                       // ★RPE はコピーしない（その日の体調依存のため）
      weightKg: s.weightKg ?? null,
      reps: s.reps ?? null,
      isUnilateral: !!s.isUnilateral,
      durationSec: s.durationSec ?? null,
      distanceKm: s.distanceKm ?? null
    }));
  } else {
    // 履歴なし → 空の1行。片側フラグだけは種目マスタの既定値を引き継ぐ
    const b = blankSet();
    b.isUnilateral = !!ex.isUnilateral;
    sets = [b];
  }

  editingWorkout.blocks.push({ exerciseId, sets });
  closeModal();
  renderWorkoutEditor();
}

// 画面の入力値を draft に吸い上げる（構造変更・保存の直前に必ず呼ぶ）
function syncEditorToDraft() {
  if (!editingWorkout) return;

  const dateEl = document.getElementById("wo-date");
  const durEl  = document.getElementById("wo-duration");
  const memoEl = document.getElementById("wo-memo");
  if (dateEl) editingWorkout.date = dateEl.value || todayStr();
  if (durEl)  editingWorkout.durationMin = durEl.value === "" ? null : Number(durEl.value);
  if (memoEl) editingWorkout.memo = memoEl.value;

  // 各セット行を読み取る。data-b(ブロック番号) と data-s(セット番号) で位置を特定
  document.querySelectorAll(".set-row").forEach((row) => {
    const bi = Number(row.dataset.b);
    const si = Number(row.dataset.s);
    const block = editingWorkout.blocks[bi];
    if (!block) return;
    const set = block.sets[si];
    if (!set) return;
    const ex = getExercise(block.exerciseId);

    const num = (sel) => {
      const el = row.querySelector(sel);
      if (!el || el.value === "") return null;
      const v = Number(el.value);
      return Number.isFinite(v) ? v : null;
    };

    set.rpe = num('[data-f="rpe"]');
    if (ex && ex.kind === "endurance") {
      const min = num('[data-f="min"]');
      const sec = num('[data-f="sec"]');
      set.durationSec = (min === null && sec === null) ? null : (min || 0) * 60 + (sec || 0);
      set.distanceKm = num('[data-f="km"]');
    } else {
      set.weightKg = num('[data-f="weight"]');
      set.reps = num('[data-f="reps"]');
      const uni = row.querySelector('[data-f="uni"]');
      set.isUnilateral = uni ? uni.checked : false;
    }
  });
}

// セット行を追加（直前の行の重量・回数・片側を引き継ぐと入力が楽なので複製する。RPEは引き継がない）
function addSetRow(blockIndex) {
  syncEditorToDraft();
  const block = editingWorkout.blocks[blockIndex];
  const prev = block.sets[block.sets.length - 1];
  const ns = blankSet();
  if (prev) {
    ns.weightKg = prev.weightKg;
    ns.reps = prev.reps;
    ns.isUnilateral = prev.isUnilateral;
    ns.durationSec = prev.durationSec;
    ns.distanceKm = prev.distanceKm;
    // rpe は引き継がない
  }
  block.sets.push(ns);
  renderWorkoutEditor();
}

// セット行を削除
function removeSetRow(blockIndex, setIndex) {
  syncEditorToDraft();
  const block = editingWorkout.blocks[blockIndex];
  block.sets.splice(setIndex, 1);
  // セットが0になったブロック（種目）は丸ごと外す
  if (block.sets.length === 0) editingWorkout.blocks.splice(blockIndex, 1);
  renderWorkoutEditor();
}

// 種目ブロックごと削除
function removeBlock(blockIndex) {
  syncEditorToDraft();
  editingWorkout.blocks.splice(blockIndex, 1);
  renderWorkoutEditor();
}

// 保存: 空（セットが1つも無い）なら破棄する
function saveWorkout() {
  syncEditorToDraft();
  const d = editingWorkout;

  const totalSets = d.blocks.reduce((n, b) => n + b.sets.length, 0);
  if (totalSets === 0) {
    // 何も記録がない → リストに出さない（案Aの二重タップ対策）
    if (d._isNew) { toast("記録が空のため保存しませんでした"); }
    else { toast("セットがありません"); return; }
    exitEditor();
    return;
  }

  const saved = {
    id: d.id,
    date: d.date || todayStr(),
    durationMin: d.durationMin ?? 0,
    memo: d.memo || "",
    sets: blocksToSets(d.blocks)
  };

  if (d._isNew) {
    db.workouts.push(saved);
  } else {
    const idx = db.workouts.findIndex((w) => w.id === d.id);
    if (idx >= 0) db.workouts[idx] = saved; else db.workouts.push(saved);
  }
  saveDB();
  toast("保存しました");
  exitEditor();
}

// ワークアウトを削除（既存のみ）
function deleteWorkout() {
  const d = editingWorkout;
  if (d._isNew) { exitEditor(); return; }
  if (!confirm("このワークアウトを削除します。取り消せません。よろしいですか？")) return;
  db.workouts = db.workouts.filter((w) => w.id !== d.id);
  saveDB();
  toast("削除しました");
  exitEditor();
}

// 編集を終える（保存/破棄後の共通処理）
function exitEditor() {
  editingWorkout = null;
  document.body.classList.remove("editing");
  currentTab = "home";
  render();
}

// キャンセル（変更があれば確認）
function cancelEditor() {
  syncEditorToDraft();
  const hasContent = editingWorkout.blocks.some((b) => b.sets.length > 0);
  if (hasContent && !confirm("編集を破棄します。よろしいですか？")) return;
  exitEditor();
}

// 1セット行の HTML
function setRowHTML(ex, set, bi, si) {
  const v = (x) => (x === null || x === undefined ? "" : x);
  if (ex.kind === "endurance") {
    const min = set.durationSec != null ? Math.floor(set.durationSec / 60) : "";
    const sec = set.durationSec != null ? set.durationSec % 60 : "";
    return `
      <div class="set-row endurance" data-b="${bi}" data-s="${si}">
        <div class="set-no">${si + 1}</div>
        <input type="number" data-f="min" inputmode="numeric" placeholder="分"  value="${v(min)}" min="0">
        <input type="number" data-f="sec" inputmode="numeric" placeholder="秒"  value="${v(sec)}" min="0" max="59">
        <input type="number" data-f="km"  inputmode="decimal" placeholder="km" value="${v(set.distanceKm)}" min="0" step="0.01">
        <input type="number" data-f="rpe" inputmode="decimal" placeholder="RPE" value="${v(set.rpe)}" min="1" max="10" step="0.5">
        <div class="del-cell"><button data-act="del-set" data-b="${bi}" data-s="${si}" aria-label="削除">×</button></div>
      </div>`;
  }
  // strength
  return `
    <div class="set-row strength" data-b="${bi}" data-s="${si}">
      <div class="set-no">${si + 1}</div>
      <input type="number" data-f="weight" inputmode="decimal" placeholder="kg"  value="${v(set.weightKg)}" min="0" step="0.5">
      <input type="number" data-f="reps"   inputmode="numeric" placeholder="回"  value="${v(set.reps)}" min="0">
      <input type="number" data-f="rpe"    inputmode="decimal" placeholder="RPE" value="${v(set.rpe)}" min="1" max="10" step="0.5">
      <div class="uni-cell"><input type="checkbox" data-f="uni" ${set.isUnilateral ? "checked" : ""} aria-label="片側"></div>
      <div class="del-cell"><button data-act="del-set" data-b="${bi}" data-s="${si}" aria-label="削除">×</button></div>
    </div>`;
}

// 種目ブロックの HTML
function blockHTML(block, bi) {
  const ex = getExercise(block.exerciseId);
  if (!ex) return "";
  const kindLabel = ex.kind === "strength" ? "筋力" : "持久";

  const head = ex.kind === "endurance"
    ? `<div class="set-head endurance"><span>#</span><span>分</span><span>秒</span><span>km</span><span>RPE</span><span></span></div>`
    : `<div class="set-head strength"><span>#</span><span>kg</span><span>回</span><span>RPE</span><span>片側</span><span></span></div>`;

  const rows = block.sets.map((s, si) => setRowHTML(ex, s, bi, si)).join("");

  return `
    <div class="card ex-block">
      <div class="ex-block-head">
        <div class="ex-block-name">${esc(ex.name)}<span class="badge">${kindLabel}</span></div>
        <button class="btn btn-sm btn-danger" data-act="del-block" data-b="${bi}">種目を外す</button>
      </div>
      ${head}
      ${rows}
      <button class="add-set" data-act="add-set" data-b="${bi}">＋ セットを追加</button>
    </div>`;
}

// 編集画面全体を描画
function renderWorkoutEditor() {
  const d = editingWorkout;
  const blocks = d.blocks.map((b, i) => blockHTML(b, i)).join("");

  const body = d.blocks.length === 0
    ? `<div class="empty">「＋ 種目を追加」から種目を選んでください。<br>前回の記録が自動で入ります。</div>`
    : blocks;

  view.innerHTML = `
    <div class="editor-bar">
      <button class="btn btn-sm" data-act="cancel-editor">キャンセル</button>
      <span class="title">${d._isNew ? "ワークアウト記録" : "ワークアウト編集"}</span>
      <button class="btn btn-sm btn-primary" data-act="save-workout">保存</button>
    </div>

    <section class="section">
      <label class="field">
        <span>日付</span>
        <input type="date" id="wo-date" value="${esc(d.date)}">
      </label>
      <label class="field">
        <span>トレーニング時間（分）</span>
        <input type="number" id="wo-duration" class="num" inputmode="numeric"
               placeholder="例: 60" value="${d.durationMin ?? ""}" min="0">
      </label>
      <label class="field">
        <span>メモ（任意）</span>
        <input type="text" id="wo-memo" value="${esc(d.memo)}" placeholder="体調・環境など">
      </label>
    </section>

    <section class="section">
      <div class="section-head"><h2 class="section-title">種目</h2></div>
      ${body}
      <button class="btn btn-block" data-act="pick-exercise" style="margin-top:10px">＋ 種目を追加</button>
    </section>

    <section class="section">
      ${d._isNew ? "" : `<button class="btn btn-danger btn-block" data-act="delete-workout">このワークアウトを削除</button>`}
    </section>`;

  window.scrollTo(0, 0);
}

// 種目ピッカー（アクティブな種目のみ・検索可）
function openExercisePicker() {
  syncEditorToDraft();   // ピッカーを開く前に入力を保全
  const render = (keyword) => {
    const kw = (keyword || "").trim().toLowerCase();
    const items = db.exercises
      .filter((e) => e.isActive)
      .filter((e) => !kw || e.name.toLowerCase().includes(kw));

    const list = items.length === 0
      ? `<div class="empty">該当する種目がありません。<br>「種目」タブで追加できます。</div>`
      : items.map((e) => {
          const kindLabel = e.kind === "strength" ? "筋力" : "持久";
          const last = lastRecordLabel(e.id);
          return `
            <button class="picker-item" data-act="add-ex-to-wo" data-id="${e.id}">
              <span>${esc(e.name)}</span>
              <span class="p-meta">${kindLabel}${last ? "・記録あり" : "・記録なし"}</span>
            </button>`;
        }).join("");

    document.getElementById("picker-list").innerHTML = list;
  };

  document.getElementById("modal-root").innerHTML = `
    <div class="modal-backdrop" data-act="close-modal">
      <div class="modal" role="dialog" aria-modal="true">
        <h3>種目を追加</h3>
        <input type="text" id="picker-search" class="picker-search" placeholder="種目名で絞り込み" autocomplete="off">
        <div class="picker-list" id="picker-list"></div>
        <button class="btn btn-block" data-act="close-modal" style="margin-top:10px">閉じる</button>
      </div>
    </div>`;

  const search = document.getElementById("picker-search");
  search.addEventListener("input", (e) => render(e.target.value));
  render("");
}


/* ---------- タブ切り替え / 全体描画 ---------- */
function render() {
  // 編集中なら編集画面を優先（タブとは独立した「画面」）
  if (editingWorkout) { renderWorkoutEditor(); renderStorageStatus(); return; }

  document.querySelectorAll("#tabbar button").forEach((b) => {
    if (b.dataset.tab === currentTab) b.setAttribute("aria-current", "page");
    else b.removeAttribute("aria-current");
  });

  if (currentTab === "home")           renderHome();
  else if (currentTab === "exercises") renderExercises();
  else if (currentTab === "settings")  renderSettings();

  renderStorageStatus();
  window.scrollTo(0, 0);
}


/* =====================================================================
   7. イベント処理
      画面を innerHTML で作り直すため、個別に addEventListener せず
      document 全体で1回だけ受けて data-act で振り分ける（イベント委譲）
   ===================================================================== */

document.getElementById("tabbar").addEventListener("click", (ev) => {
  const btn = ev.target.closest("button[data-tab]");
  if (!btn) return;
  currentTab = btn.dataset.tab;
  render();
});

document.addEventListener("click", (ev) => {
  const el = ev.target.closest("[data-act]");
  if (!el) return;

  // モーダル背景のクリックだけで閉じる（モーダル内側のクリックでは閉じない）
  if (el.dataset.act === "close-modal" && ev.target !== el) return;

  switch (el.dataset.act) {
    case "add-ex":      openExerciseModal(null); break;
    case "edit-ex":     openExerciseModal(el.dataset.id); break;
    case "save-ex":     saveExerciseFromModal(el.dataset.id || null); break;
    case "close-modal": closeModal(); break;

    case "export-json": exportJSON(); break;
    case "export-csv":  exportCSV(); break;
    case "import-json": document.getElementById("import-file").click(); break;

    // ---- ワークアウト編集（フェーズ2） ----
    case "new-workout":    startNewWorkout(); break;
    case "edit-workout":   startEditWorkout(el.dataset.id); break;
    case "cancel-editor":  cancelEditor(); break;
    case "save-workout":   saveWorkout(); break;
    case "delete-workout": deleteWorkout(); break;
    case "pick-exercise":  openExercisePicker(); break;
    case "add-ex-to-wo":   addExerciseToDraft(el.dataset.id); break;
    case "add-set":        addSetRow(Number(el.dataset.b)); break;
    case "del-set":        removeSetRow(Number(el.dataset.b), Number(el.dataset.s)); break;
    case "del-block":      removeBlock(Number(el.dataset.b)); break;
  }
});


/* =====================================================================
   8. 起動
   ===================================================================== */

loadDB();
render();

// Service Worker の登録（オフライン動作用）。
// file:// で直接開いた場合は登録されないので、その場合も動くよう例外を握る。
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW未登録:", e));
}
</script>
</body>
</html>
